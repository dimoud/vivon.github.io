<!DOCTYPE html>
<html lang="el">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e8eaed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>VIVON</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @media print {
      .bottom-bar, .top-nav, .fab, .modal-overlay, .toast { display: none !important; }
      .page { display: none !important; }
      .app-shell { display: block !important; }
      .sidebar { display: none !important; }
      #print-view { display: block !important; }
      body { padding: 0; background: white; margin: 0; }
    }
    #print-view { display: none; }
  </style>
</head>
<body>

  <!-- APP SHELL — hidden until auth confirmed -->
  <div class="app-shell app-hidden" id="app-shell">

    <!-- SIDEBAR (desktop) -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="logo.png" alt="VIVON" class="sidebar-logo-img" onerror="this.style.display='none'">
        <div class="sidebar-brand-title">VIVON</div>
      </div>
      <div class="sidebar-nav">
        <button class="sidebar-item active" data-tab="today">
          <span class="sidebar-icon">🏠</span>
          <span class="sidebar-label">Ημερήσιο</span>
        </button>
        <button class="sidebar-item" data-tab="week">
          <span class="sidebar-icon">📅</span>
          <span class="sidebar-label">Εβδομαδιαίο</span>
        </button>
        <button class="sidebar-item" data-tab="ideas">
          <span class="sidebar-icon">💡</span>
          <span class="sidebar-label">Ιδέες</span>
        </button>
        <button class="sidebar-item" data-tab="builder">
          <span class="sidebar-icon">🏗️</span>
          <span class="sidebar-label">Σχεδιαστής</span>
        </button>
        <button class="sidebar-item" data-tab="body">
          <span class="sidebar-icon">⚖️</span>
          <span class="sidebar-label">Μετρήσεις</span>
        </button>
        <button class="sidebar-item" data-tab="stats">
          <span class="sidebar-icon">📊</span>
          <span class="sidebar-label">Στατιστικά</span>
        </button>
        <button class="sidebar-item" data-tab="settings">
          <span class="sidebar-icon">⚙️</span>
          <span class="sidebar-label">Ρυθμίσεις</span>
        </button>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-avatar">Δ</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name">Δημήτριος</div>
          <div class="sidebar-user-sub">Διαιτολόγιο</div>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-ghost btn-sm" onclick="exportPDF()" style="width:100%;margin-bottom:6px">🖨️ PDF</button>
        <button class="btn btn-ghost btn-sm" onclick="handleSignOut()" style="width:100%;color:var(--red)">⏏ Αποσύνδεση</button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="app-content">

      <!-- TOP BAR (mobile only) -->
      <nav class="top-nav" id="top-nav">
        <div class="top-nav-inner">
          <div class="app-title" id="top-app-title"><img src="logo.png" alt="VIVON" class="topnav-logo" onerror="this.style.display='none'"></div>
          <div id="hero-title">VIVON</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="exportPDF()">🖨️ PDF</button>
            <button class="btn btn-ghost btn-sm" onclick="handleSignOut()" style="color:var(--red)">⏏</button>
          </div>
        </div>
      </nav>

      <!-- PAGES -->
      <main>
        <div id="page-today"    class="page active"></div>
        <div id="page-week"     class="page"></div>
        <div id="page-ideas"    class="page"></div>
        <div id="page-builder"  class="page"></div>
        <div id="page-body"     class="page"></div>
        <div id="page-stats"    class="page"></div>
        <div id="page-settings" class="page"></div>
        <!-- legacy pages kept for internal renders -->
        <div id="page-profile"  class="page" style="display:none"></div>
        <div id="page-recipes"  class="page" style="display:none"></div>
        <div id="page-foods"    class="page" style="display:none"></div>
        <div id="page-optimize" class="page" style="display:none"></div>
      </main>

      <!-- PRINT VIEW (generated at print time) -->
      <div id="print-view"></div>

      <!-- BOTTOM TAB BAR (mobile only) -->
      <nav class="bottom-bar">
        <button class="tab-item active" data-tab="today">
          <span class="tab-icon">🏠</span>
          Ημερήσιο
        </button>
        <button class="tab-item" data-tab="week">
          <span class="tab-icon">📅</span>
          Εβδομάδα
        </button>
        <button class="tab-item" data-tab="ideas">
          <span class="tab-icon">💡</span>
          Ιδέες
        </button>
        <button class="tab-item" data-tab="builder">
          <span class="tab-icon">🏗️</span>
          Σχεδιαστής
        </button>
        <button class="tab-item" data-tab="body">
          <span class="tab-icon">⚖️</span>
          Μετρήσεις
        </button>
        <button class="tab-item" data-tab="stats">
          <span class="tab-icon">📊</span>
          Στατιστικά
        </button>
        <button class="tab-item" data-tab="settings">
          <span class="tab-icon">⚙️</span>
          Ρυθμίσεις
        </button>
      </nav>

    </div><!-- /app-content -->
  </div><!-- /app-shell -->

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-sheet">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- AUTH SCREEN (shown before login, hidden after) -->
  <div id="auth-screen" class="auth-screen"></div>

  <!-- SCRIPTS -->
  <script src="data.js"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
  <script src="auth.js"></script>
</body>
</html>
