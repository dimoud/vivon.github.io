<!DOCTYPE html>
<html lang="el">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e8eaed">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>VIVON</title>
  <link rel="stylesheet" href="style.css">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.50.0/dist/umd/supabase.js" crossorigin="anonymous"></script>
  <style>
    @media print {
      .bottom-bar, .top-nav, .fab, .modal-overlay, .toast, .drawer, .drawer-overlay, .app-footer, .legal-modal-overlay { display: none !important; }
      .page { display: none !important; }
      .app-shell { display: block !important; }
      .sidebar { display: none !important; }
      #print-view { display: block !important; }
      body { padding: 0; background: white; margin: 0; }
    }
    #print-view { display: none; }
  </style>
</head>
<body>

  <!-- APP SHELL -->
  <div class="app-shell app-hidden" id="app-shell">

    <!-- SIDEBAR (desktop) -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo" onclick="goToDay(0)" style="cursor:pointer" title="Ημέρα 1">
        <img src="logo.png" alt="VIVON" class="sidebar-logo-img" onerror="this.style.display='none'">
        <div class="sidebar-brand-title">VIVON</div>
      </div>
      <div class="sidebar-nav">
        <button class="sidebar-item active" data-tab="today">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          <span class="sidebar-label">Ημερήσιο</span>
        </button>
        <button class="sidebar-item" data-tab="week">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          <span class="sidebar-label">Εβδομαδιαίο</span>
        </button>
        <button class="sidebar-item" data-tab="ideas">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3-1.8 5.4-4.5 6.5V17a1 1 0 0 1-1 1h-3a1 1 0 0 1-1-1v-1.5C6.8 14.4 5 12 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="10" y1="18" x2="14" y2="18"/></svg></span>
          <span class="sidebar-label">Ιδέες</span>
        </button>
        <button class="sidebar-item" data-tab="builder">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></span>
          <span class="sidebar-label">Σχεδιαστής</span>
        </button>
        <button class="sidebar-item" data-tab="body">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><path d="M4 12l4-4m-4 4l4 4"/><path d="M20 12l-4-4m4 4l-4 4"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span>
          <span class="sidebar-label">Μετρήσεις</span>
        </button>
        <button class="sidebar-item" data-tab="stats">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span>
          <span class="sidebar-label">Στατιστικά</span>
        </button>
        <button class="sidebar-item" data-tab="settings">
          <span class="sidebar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          <span class="sidebar-label">Ρυθμίσεις</span>
        </button>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebar-avatar"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-user-name"></div>
          <div class="sidebar-user-sub" id="sidebar-user-sub">Διαιτολόγιο</div>
        </div>
      </div>
      <div class="sidebar-footer">
        <button id="sidebar-pdf-btn" class="btn btn-ghost btn-sm" onclick="exportPDF()" style="width:100%;margin-bottom:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> PDF</button>
        <button id="sidebar-logout-btn" class="btn btn-ghost btn-sm" onclick="handleSignOut()" style="width:100%;color:var(--red)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Αποσύνδεση</button>
        <button id="sidebar-help-btn" class="btn btn-ghost btn-sm sidebar-help-btn" onclick="window._openHelp && window._openHelp()" style="width:100%;margin-top:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:5px"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>Βοήθεια</button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="app-content">

      <!-- TOP BAR (mobile only) -->
      <nav class="top-nav" id="top-nav">
        <div class="top-nav-inner">
          <div class="app-title" id="top-app-title" onclick="goToDay(0)" style="cursor:pointer" title="Ημέρα 1">
            <img src="logo.png" alt="VIVON" class="topnav-logo" onerror="this.style.display='none'">
            <span id="hero-title">VIVON</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center">
            <button class="topnav-icon-btn" id="drawer-open-btn" onclick="openDrawer()" title="Μενού">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
          </div>
        </div>
      </nav>

      <!-- SIDE DRAWER (mobile) -->
      <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
      <nav class="drawer" id="drawer">
        <div class="drawer-header">
          <div class="drawer-avatar" id="drawer-avatar">U</div>
          <div class="drawer-user-info">
            <div class="drawer-user-name" id="drawer-user-name"></div>
            <div class="drawer-user-email" id="drawer-user-email">—</div>
          </div>
          <button class="drawer-close-btn" onclick="closeDrawer()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="drawer-body">
          <button class="drawer-item active" data-tab="today" onclick="switchTabFromDrawer('today')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="drawer-item-label">Ημερήσιο</span>
          </button>
          <button class="drawer-item" data-tab="week" onclick="switchTabFromDrawer('week')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="drawer-item-label">Εβδομαδιαίο</span>
          </button>
          <button class="drawer-item" data-tab="builder" onclick="switchTabFromDrawer('builder')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg></span><span class="drawer-item-label">Σχεδιαστής</span>
          </button>
          <button class="drawer-item" data-tab="ideas" onclick="switchTabFromDrawer('ideas')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3-1.8 5.4-4.5 6.5V17a1 1 0 0 1-1 1h-3a1 1 0 0 1-1-1v-1.5C6.8 14.4 5 12 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="10" y1="18" x2="14" y2="18"/></svg></span><span class="drawer-item-label">Ιδέες</span>
          </button>
          <button class="drawer-item" data-tab="body" onclick="switchTabFromDrawer('body')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><path d="M4 12l4-4m-4 4l4 4"/><path d="M20 12l-4-4m4 4l-4 4"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span><span class="drawer-item-label">Μετρήσεις</span>
          </button>
          <button class="drawer-item" data-tab="stats" onclick="switchTabFromDrawer('stats')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span><span class="drawer-item-label">Στατιστικά</span>
          </button>
          <button class="drawer-item" data-tab="settings" onclick="switchTabFromDrawer('settings')">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span><span class="drawer-item-label">Ρυθμίσεις</span>
          </button>
          <button id="drawer-pdf-btn" class="drawer-item" onclick="exportPDF();closeDrawer()">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></span><span class="drawer-item-label">Εξαγωγή PDF</span>
          </button>
          <a href="https://revolut.me/dimitrtxl" target="_blank" rel="noopener" class="drawer-item" style="text-decoration:none;opacity:0.6">
            <span class="drawer-item-icon">&#9829;</span><span class="drawer-item-label">Δωρεά</span>
          </a>
          <button class="drawer-item drawer-item-danger" onclick="handleSignOut()">
            <span class="drawer-item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span><span class="drawer-item-label">Αποσύνδεση</span>
          </button>
        </div>
      </nav>

      <!-- PAGES -->
      <main>
        <div id="page-today"    class="page active"></div>
        <div id="page-week"     class="page"></div>
        <div id="page-ideas"    class="page"></div>
        <div id="page-builder"  class="page"></div>
        <div id="page-body"     class="page"></div>
        <div id="page-stats"    class="page"></div>
        <div id="page-settings" class="page"></div>
        <!-- legacy pages kept for internal renders -->
        <div id="page-profile"  class="page" style="display:none"></div>
        <div id="page-recipes"  class="page" style="display:none"></div>
        <div id="page-foods"    class="page" style="display:none"></div>
        <div id="page-optimize" class="page" style="display:none"></div>
      </main>

      <!-- LEGAL FOOTER -->
      <footer class="app-footer" id="app-footer">
        <!-- Desktop: inline discreet text (populated by i18n) -->
        <div class="app-footer-desktop"></div>
        <!-- Mobile: link that opens modal (populated by i18n) -->
        <button class="app-footer-mobile" onclick="openLegalModal()"></button>
      </footer>

      <!-- PRINT VIEW (generated at print time) -->
      <div id="print-view"></div>

      <!-- BOTTOM TAB BAR (mobile only) -->
      <nav class="bottom-bar">
        <button class="tab-item active" data-tab="today">
          <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          <span class="tab-label-i18n">Ημερήσιο</span>
        </button>
        <button class="tab-item" data-tab="week">
          <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
          <span class="tab-label-i18n">Εβδομάδα</span>
        </button>
        <button class="tab-item" data-tab="ideas">
          <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 3-1.8 5.4-4.5 6.5V17a1 1 0 0 1-1 1h-3a1 1 0 0 1-1-1v-1.5C6.8 14.4 5 12 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/><line x1="10" y1="18" x2="14" y2="18"/></svg></span>
          <span class="tab-label-i18n">Ιδέες</span>
        </button>
        <button class="tab-item" data-tab="body">
          <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><path d="M4 12l4-4m-4 4l4 4"/><path d="M20 12l-4-4m4 4l-4 4"/><line x1="12" y1="4" x2="12" y2="20"/></svg></span>
          <span class="tab-label-i18n">Μετρήσεις</span>
        </button>
        <button class="tab-item tab-menu-btn" onclick="openDrawer()">
          <span class="tab-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></span>
          <span class="tab-label-i18n">Μενού</span>
        </button>
      </nav>

    </div><!-- /app-content -->
  </div><!-- /app-shell -->

  <!-- PLAN WIZARD -->
  <div id="wizard-overlay" class="wizard-overlay">
    <div class="wizard-modal">
      <div class="wizard-header">
        <button class="wizard-close-btn" onclick="_closeWizard()" aria-label="Κλείσιμο">✕</button>
        <div class="wizard-title" id="wizard-step-title"></div>
        <div class="wizard-steps" id="wizard-step-dots"></div>
        <div class="wizard-step-label" id="wizard-meal-label"></div>
        <div class="wizard-step-sublabel" id="wizard-meal-sublabel"></div>
      </div>
      <div class="wizard-body" id="wizard-body"></div>
      <div class="wizard-footer">
        <button class="btn-back" id="wizard-btn-back" onclick="wizardBack()">← Πίσω</button>
        <button class="btn-next" id="wizard-btn-next" onclick="wizardNext()">Επόμενο →</button>
      </div>
    </div>
  </div>

  <!-- MEAL BUILDER OVERLAY -->
  <div id="mb-overlay" class="mb-overlay">
    <div class="mb-modal">
      <button class="mb-overlay-close" onclick="closeMealBuilder()" aria-label="Κλείσιμο">✕</button>
      <div id="mb-overlay-content"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-sheet">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <!-- LEGAL MODAL (mobile) -->
  <div id="legal-modal-overlay" class="legal-modal-overlay">
    <div class="legal-modal-sheet">
      <div class="legal-modal-header">
        <span class="legal-modal-title"></span>
        <button class="legal-modal-close" onclick="closeLegalModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="legal-modal-body"></div>
    </div>
  </div>

  <!-- ONBOARDING CAROUSEL (shown for new users after first sign-in) -->
  <div id="onboarding-overlay" class="onboarding-overlay" style="display:none"></div>


  <!-- SCRIPTS -->
