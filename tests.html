// ══════════════════════════════════════════════════════════════════
// Micro test runner
// ══════════════════════════════════════════════════════════════════
const results = [];
let currentSuite = '';

function suite(name) { currentSuite = name; }

let _testCounter = 0;

function test(name, fn) {
  _testCounter++;
  const numbered = `#${_testCounter} ${name}`;
  try {
    fn();
    results.push({ suite: currentSuite, name: numbered, pass: true });
  } catch (e) {
    results.push({ suite: currentSuite, name: numbered, pass: false, msg: e.message });
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || 'Assertion failed');
}

function assertEq(actual, expected, label) {
  if (actual !== expected)
    throw new Error(`${label || ''}: expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
}

function assertNear(actual, expected, tol, label) {
  if (Math.abs(actual - expected) > tol)
    throw new Error(`${label || ''}: expected ≈${expected} (±${tol}), got ${actual}`);
}

suite('BMR (Mifflin-St Jeor)');

test('male reference profile', () => {
  // 10*95.9 + 6.25*188 - 5*34 + 5 = 959 + 1175 - 170 + 5 = 1969
  const bmr = calcBMR({ gender: 'male', weight: 95.9, height: 188, age: 34 });
  assertEq(bmr, 1969, 'male BMR');
});

test('female reference profile', () => {
  // 10*60 + 6.25*165 - 5*30 - 161 = 600 + 1031.25 - 150 - 161 = 1320
  const bmr = calcBMR({ gender: 'female', weight: 60, height: 165, age: 30 });
  assertEq(bmr, 1320, 'female BMR');
});

test('male low body weight', () => {
  const bmr = calcBMR({ gender: 'male', weight: 55, height: 170, age: 25 });
  // 10*55 + 6.25*170 - 5*25 + 5 = 550 + 1062.5 - 125 + 5 = 1493
  assertEq(bmr, 1493, 'low-weight male');
});

test('returns integer', () => {
  const bmr = calcBMR({ gender: 'male', weight: 75.7, height: 177, age: 28 });
  assertEq(bmr, Math.round(bmr), 'must be integer');

// SUITE 3 — Step calorie calculation (biomechanics formula)
// calcStepCalories(steps, weightKg, heightCm, gender)
// stepLength (m) = height_m * 0.415 (male) or * 0.413 (female)
// distanceKm = steps * stepLength / 1000
// kcal = round(weight * distanceKm * 0.53)
// ══════════════════════════════════════════════════════════════════
suite('Step Calories (calcStepCalories)');

test('0 steps → 0 kcal', () => {
  assertEq(calcStepCalories(0, 95.9, 188, 'male'), 0);
});

test('null/undefined steps treated as 0', () => {
  assertEq(calcStepCalories(null, 70, 170, 'male'), 0);
  assertEq(calcStepCalories(undefined, 70, 170, 'male'), 0);
});

test('male 8000 steps, 95.9kg, 188cm — biomechanics formula', () => {
  // stepLength = 1.88 * 0.415 = 0.7802m
  // distance = 8000 * 0.7802 / 1000 = 6.2416 km
  // kcal = round(95.9 * 6.2416 * 0.53) = round(317.56) = 318
  const expected = Math.round(95.9 * (8000 * (1.88 * 0.415) / 1000) * 0.53);
  assertEq(calcStepCalories(8000, 95.9, 188, 'male'), expected);
});

test('female 10000 steps, 60kg, 165cm — biomechanics formula', () => {
  // stepLength = 1.65 * 0.413 = 0.68145m
  // distance = 10000 * 0.68145 / 1000 = 6.8145 km
  // kcal = round(60 * 6.8145 * 0.53) = round(216.82) = 217
  const expected = Math.round(60 * (10000 * (1.65 * 0.413) / 1000) * 0.53);
  assertEq(calcStepCalories(10000, 60, 165, 'female'), expected);
});

test('scales with weight — more weight burns more kcal', () => {
  const light = calcStepCalories(8000, 60, 175, 'male');
  const heavy  = calcStepCalories(8000, 100, 175, 'male');
  assert(heavy > light, `heavy (${heavy}) should > light (${light})`);
});

test('missing weight/height falls back to defaults', () => {
  // Should not throw — uses 70kg / 170cm defaults
  const result = calcStepCalories(5000, null, null, 'male');
  assert(result >= 0, 'should return non-negative');
});

});

test('5 sessions, 95.9kg — formula check', () => {
  const expected = Math.round(5.5 * 95.9 * 1.0 * 5 / 7);
  assertEq(calcExerciseCalories(5, 95.9), expected);
});

test('scales with weight', () => {
  const light = calcExerciseCalories(3, 60);
  const heavy  = calcExerciseCalories(3, 120);

});

});

// ══════════════════════════════════════════════════════════════════
// SUITE 5 — TDEE (calcSuggestedTDEE and calcTDEE)
// calcSuggestedTDEE(p) = round((BMR + walking + exercise) * 1.10)
// activity field = sessions/week (0, 2, 3, 5, 7)
// ══════════════════════════════════════════════════════════════════
suite('TDEE');

// Reference profile: sessions/week-based activity
const profileA = { gender: 'male', weight: 95.9, height: 188, age: 34, activity: 3, dailySteps: 8000 };

test('calcSuggestedTDEE = round((BMR + walking + exercise) * 1.10)', () => {
  const bmr      = calcBMR(profileA);
  const walking  = calcStepCalories(8000, 95.9, 188, 'male');
  const exercise = calcExerciseCalories(3, 95.9);
  const expected = Math.round((bmr + walking + exercise) * 1.10);
  assertEq(calcSuggestedTDEE(profileA), expected, 'suggestedTDEE');
});

test('TEF multiplier 1.10 is applied', () => {
  const p = { gender: 'male', weight: 80, height: 180, age: 30, activity: 0, dailySteps: 0 };
  const bmr = calcBMR(p);
  const expected = Math.round(bmr * 1.10);
  assertEq(calcSuggestedTDEE(p), expected, 'zero activity → BMR * 1.10');
});

test('calcTDEE falls back to suggested when useCustomTDEE=false', () => {
  const p = { ...profileA, useCustomTDEE: false, customTDEE: 9999 };
  assertEq(calcTDEE(p), calcSuggestedTDEE(p));
});

test('calcTDEE uses customTDEE when useCustomTDEE=true', () => {
  const p = { ...profileA, useCustomTDEE: true, customTDEE: 2200 };
  assertEq(calcTDEE(p), 2200);
});

test('calcTDEE falls back to suggested when customTDEE=0 (even if flag set)', () => {
  const p = { ...profileA, useCustomTDEE: true, customTDEE: 0 };
  assertEq(calcTDEE(p), calcSuggestedTDEE(p));
});

test('more sessions → higher TDEE', () => {
  const p0 = { ...profileA, activity: 0 };
  const p5 = { ...profileA, activity: 5 };
  assert(calcSuggestedTDEE(p5) > calcSuggestedTDEE(p0), 'more sessions = more TDEE');
});

test('more steps → higher TDEE', () => {
  const pLow  = { ...profileA, dailySteps: 2000 };
  const pHigh = { ...profileA, dailySteps: 15000 };
  assert(calcSuggestedTDEE(pHigh) > calcSuggestedTDEE(pLow), 'more steps = more TDEE');
});

// ══════════════════════════════════════════════════════════════════
// SUITE 12 — Optimizer (_optimiseDayMacros)
// ══════════════════════════════════════════════════════════════════
suite('Day optimizer (_optimiseDayMacros)');

// Build a fake day with two standard meals that have known macros
// sm2: kcal_est=136, p=16, c=8, f=8
// sm1: kcal_est=250, p=8,  c=32, f=10
// Combined raw: kcal=386, p=24
function makeFakeDay(ids) {
  return {
    meals: ids.map(id => ({ standardId: id, scaleFactor: 1, done: false }))
  };
}

test('optimiser sets scaleFactor on all meals', () => {
  const day = makeFakeDay(['sm1', 'sm2']);
  _optimiseDayMacros(day, { kcal: 500, protein: 30, carbs: 100, fat: 30 });
  day.meals.forEach(m => {
    assert(m.scaleFactor !== undefined, 'scaleFactor must be set');
    assert(typeof m.scaleFactor === 'number', 'scaleFactor must be a number');
  });
});

test('optimiser scaleFactor stays within [0.6, 1.6] bounds', () => {
  const day = makeFakeDay(['sm1', 'sm2']);
  // Extreme target: much higher than raw total
  _optimiseDayMacros(day, { kcal: 9999, protein: 500, carbs: 999, fat: 999 });
  day.meals.forEach(m => {
    assert(m.scaleFactor <= 1.6, `scaleFactor ${m.scaleFactor} exceeds max 1.6`);
    assert(m.scaleFactor >= 0.6, `scaleFactor ${m.scaleFactor} below min 0.6`);
  });
});

test('optimiser scaleFactor stays within bounds when target is very low', () => {
  const day = makeFakeDay(['sm1', 'sm2']);
  _optimiseDayMacros(day, { kcal: 1, protein: 1, carbs: 1, fat: 1 });
  day.meals.forEach(m => {
    assert(m.scaleFactor >= 0.6, `scaleFactor ${m.scaleFactor} below min 0.6`);
  });
});

test('optimiser brings kcal closer to target than unscaled', () => {
  const day = makeFakeDay(['sm1', 'sm2']); // raw = 386 kcal
  const target = { kcal: 600, protein: 40, carbs: 100, fat: 30 };
  _optimiseDayMacros(day, target);
  const scaled = day.meals.reduce((s, m) => {
    const sm = STANDARD_MEALS.find(x => x.id === m.standardId);
    return s + (sm ? sm.kcal_est * m.scaleFactor : 0);
  }, 0);
  // Should be closer to 600 than 386 was
  assert(Math.abs(scaled - 600) < Math.abs(386 - 600),
    `optimised kcal ${scaled.toFixed(0)} should be closer to 600 than raw 386`);
});

test('optimiser does not crash on empty meals array', () => {
  const day = { meals: [] };
  _optimiseDayMacros(day, { kcal: 1800, protein: 150, carbs: 200, fat: 60 });
  assertEq(day.meals.length, 0, 'empty meals stays empty');
});

test('optimiser does not crash on meal with no matching standard id', () => {
  const day = { meals: [{ standardId: 'DOES_NOT_EXIST', scaleFactor: 1, done: false }] };
  _optimiseDayMacros(day, { kcal: 1800, protein: 150, carbs: 200, fat: 60 });
  // Should not throw — no-op
  assert(true, 'no crash');
});

// SUITE 20 — checkWeekReset clock-skew guard
// ══════════════════════════════════════════════════════════════════
suite('checkWeekReset clock-skew guard');

// Save and restore state around each test
function withState(overrides, fn) {
  const saved = JSON.parse(JSON.stringify({
    weekKey: state.weekKey,
    weekCreatedAt: state.weekCreatedAt,
    week: state.week,
    supplements: state.supplements,
  }));
  Object.assign(state, overrides);
  try { fn(); } finally {
    state.weekKey       = saved.weekKey;
    state.weekCreatedAt = saved.weekCreatedAt;
    state.week          = saved.week;
    state.supplements   = saved.supplements;
  }
}

test('no reset when weekKey matches current week', () => {
  const currentKey = getISOWeekKey();
  withState({ weekKey: currentKey, weekCreatedAt: Date.now() - 7 * 24 * 60 * 60 * 1000 }, () => {
    state.week[0].meals = [{ done: true }];
    checkWeekReset();
    assertEq(state.week[0].meals[0].done, true, 'done flag should be untouched');
  });
});

test('no reset when elapsed < 6 days even if weekKey differs (clock skew)', () => {
  withState({
    weekKey: '1990-W01',                           // definitely different from current
    weekCreatedAt: Date.now() - 2 * 24 * 60 * 60 * 1000, // only 2 days ago
  }, () => {
    state.week[0].meals = [{ done: true }];
    checkWeekReset();
    assertEq(state.week[0].meals[0].done, true, 'should NOT reset — elapsed < 6 days');
    assertEq(state.weekKey, '1990-W01', 'weekKey should be unchanged');
  });
});

test('reset happens when weekKey differs AND elapsed >= 6 days', () => {
  withState({
    weekKey: '1990-W01',
    weekCreatedAt: Date.now() - 8 * 24 * 60 * 60 * 1000, // 8 days ago
  }, () => {
    state.week[0].meals = [{ done: true }];
    state.week[0].stepsDone = true;
    checkWeekReset();
    assertEq(state.week[0].meals[0].done, false, 'done flag should be reset');
    assertEq(state.week[0].stepsDone,     false, 'stepsDone should be reset');
    assertEq(state.weekKey, getISOWeekKey(), 'weekKey should update to current');
  });
});

test('reset clears supplement done flags', () => {
  withState({
    weekKey: '1990-W01',
    weekCreatedAt: Date.now() - 8 * 24 * 60 * 60 * 1000,
  }, () => {
    state.supplements = { done: { s1: true, s2: true }, activeIds: [] };
    checkWeekReset();
    assertEq(Object.keys(state.supplements.done).length, 0, 'supplement done should be cleared');
  });
});

test('first run (no weekKey) stamps current week without resetting', () => {
  withState({ weekKey: undefined, weekCreatedAt: undefined }, () => {
    state.week[0].meals = [{ done: true }];
    checkWeekReset();
    assertEq(state.weekKey, getISOWeekKey(), 'should stamp current weekKey');
    assertEq(state.week[0].meals[0].done, true, 'should NOT reset meals on first run');
  });
});

suite('applyGoalPace');

// Stub the DOM-touching calls inside applyGoalPace
window.autoSaveSettings = () => {};
const _origRenderProfile = window.renderProfile;
window.renderProfile = () => {};

const _paceProfile = { gender: 'male', weight: 80, height: 180, age: 30, activity: 3, dailySteps: 8000 };

});

// SUITE 34 — sendFeedback GAS mail engine wiring
// ══════════════════════════════════════════════════════════════════
suite('sendFeedback — GAS mail engine');

(function() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbx6XHAAeJMIUVUBtHmjNqu6NGSKvFWgkWeUT4x6x_UMsmEaoPXFPMqlhXLKH5dJ0aGlag/exec';
  const REQUIRED_FIELDS = ['_to', '_key', '_hp', 'subject', 'message', 'name'];

  // Intercept fetch and capture the last call made to the GAS URL
  let _lastGasCall = null;
  const _origFetch = window.fetch;
  window.fetch = function(url, opts) {
    if (typeof url === 'string' && url === GAS_URL) {
      _lastGasCall = { url, opts };
      return Promise.resolve({ ok: true, json: async () => ({ result: 'success' }) });
    }
    // Let Supabase calls fall through (they will fail silently in the stub)
    return Promise.resolve({ ok: false, json: async () => ({}) });
  };

  // Ensure DOM elements sendFeedback needs
  function _ensureEl(id, tag) {
    let el = document.getElementById(id);
    if (!el) { el = document.createElement(tag || 'div'); el.id = id; document.body.appendChild(el); }
    return el;
  }

  test('sendFeedback builds FormData with all required fields', async () => {
    _lastGasCall = null;
    _selectedFeedbackType = 'bug';
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'Test message for GAS';
    _ensureEl('feedback-send-btn', 'button');
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch was not called with GAS URL');
    const fd = _lastGasCall.opts.body;
    assert(fd instanceof FormData, 'body must be FormData');
    REQUIRED_FIELDS.forEach(f => {
      assert(fd.get(f) !== null, `FormData missing field: ${f}`);
    });
  });

  test('_to is always moudiotis.meng@gmail.com', async () => {
    _lastGasCall = null;
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'Check recipient';
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch not called');
    assertEq(_lastGasCall.opts.body.get('_to'), 'moudiotis.meng@gmail.com', '_to field');
  });

  test('_key is the agency key', async () => {
    _lastGasCall = null;
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'Check key';
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch not called');
    assertEq(_lastGasCall.opts.body.get('_key'), 'MyPrivateAgencyKey_99', '_key field');
  });

  test('_hp (honeypot) is empty', async () => {
    _lastGasCall = null;
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'Check honeypot';
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch not called');
    assertEq(_lastGasCall.opts.body.get('_hp'), '', 'honeypot must be empty');
  });

  test('subject contains feedback type', async () => {
    _lastGasCall = null;
    _selectedFeedbackType = 'idea';
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'New idea here';
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch not called');
    const subject = _lastGasCall.opts.body.get('subject');
    assert(subject && subject.includes('idea'), `subject should mention type, got: ${subject}`);
  });

  test('message field includes the user text', async () => {
    _lastGasCall = null;
    _selectedFeedbackType = 'general';
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = 'unique-marker-text-xyz';
    await sendFeedback();
    assert(_lastGasCall !== null, 'fetch not called');
    const msg = _lastGasCall.opts.body.get('message');
    assert(msg && msg.includes('unique-marker-text-xyz'), `message missing user text, got: ${msg}`);
  });

  test('empty text does NOT call fetch', async () => {
    _lastGasCall = null;
    const ta = _ensureEl('feedback-text', 'textarea');
    ta.value = '   ';
    await sendFeedback();
    assert(_lastGasCall === null, 'fetch should not be called for empty message');
  });

  // Restore fetch
  window.fetch = _origFetch;
})();

// ══════════════════════════════════════════════════════════════════
// Render results
// ══════════════════════════════════════════════════════════════════
(function render() {
  const out = document.getElementById('output');
  const suites = [...new Set(results.map(r => r.suite))];

  suites.forEach(suiteName => {
    const tests = results.filter(r => r.suite === suiteName);
    const div = document.createElement('div');
    div.className = 'suite';
    div.innerHTML = `<div class="suite-name">${suiteName}</div>`;
    tests.forEach(t => {
      const pass = t.pass;
      div.innerHTML += `
        <div class="test">
          <span class="icon ${pass ? 'pass' : 'fail'}">${pass ? '✓' : '✗'}</span>
          <span class="${pass ? 'pass' : 'fail'}">${t.name}</span>
        </div>
        ${!pass ? `<div class="msg">${t.msg}</div>` : ''}
      `;
    });
    out.appendChild(div);
  });

  const passed = results.filter(r => r.pass).length;
  const total  = results.length;
  const failed = total - passed;
  const summary = document.getElementById('summary');
  summary.className = `summary-${failed === 0 ? 'pass' : 'fail'}`;
  summary.textContent = failed === 0
    ? `✓ All ${total} tests passed`
    : `✗ ${failed} of ${total} tests failed`;
})();
